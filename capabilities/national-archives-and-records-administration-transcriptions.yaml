        idempotent: false
      call: national-archives-and-records-administration-transcriptions.post
      with:
        parentContributionId: tools.parentContributionId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-transcriptions-their-parent-record-s
      description: Get transcriptions by their parent record's naId.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-archives-and-records-administration-transcriptions.get
      with:
        naId: tools.naId
      outputParameters:
      - type: object
