naftiko: 1.0.0-alpha2
info:
  label: NextGen Catalog API — Justifications
  description: 'NextGen Catalog API — Justifications. 1 operations. Lead operation: Get justifications directly from the database..
    Self-contained Naftiko capability covering one National Archives And Records Administration business surface.'
  tags:
  - National Archives And Records Administration
  - Justifications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_ARCHIVES_AND_RECORDS_ADMINISTRATION_API_KEY: NATIONAL_ARCHIVES_AND_RECORDS_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-archives-and-records-administration-justifications
    baseUri: https://catalog.archives.gov/api/v2
    description: NextGen Catalog API — Justifications business capability. Self-contained, no shared references.
    resources:
    - name: justifications
      path: /justifications
      operations:
      - name: get
        method: GET
        description: Get justifications directly from the database.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: national-archives-and-records-administration-justifications-rest
    port: 8080
    description: REST adapter for NextGen Catalog API — Justifications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/justifications
      name: justifications
      description: REST surface for justifications.
      operations:
      - method: GET
        name: get
        description: Get justifications directly from the database.
        call: national-archives-and-records-administration-justifications.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: national-archives-and-records-administration-justifications-mcp
    port: 9090
    transport: http
    description: MCP adapter for NextGen Catalog API — Justifications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-justifications-directly-database
      description: Get justifications directly from the database.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-archives-and-records-administration-justifications.get
      outputParameters:
      - type: object
        mapping: $.
