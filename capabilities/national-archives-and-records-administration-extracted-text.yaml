naftiko: 1.0.0-alpha2
info:
  label: NextGen Catalog API — Extracted Text
  description: 'NextGen Catalog API — Extracted Text. 1 operations. Lead operation: Get extracted text for a given naid and
    digital object ID.. Self-contained Naftiko capability covering one National Archives And Records Administration business
    surface.'
  tags:
  - National Archives And Records Administration
  - Extracted Text
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_ARCHIVES_AND_RECORDS_ADMINISTRATION_API_KEY: NATIONAL_ARCHIVES_AND_RECORDS_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-archives-and-records-administration-extracted-text
    baseUri: https://catalog.archives.gov/api/v2
    description: NextGen Catalog API — Extracted Text business capability. Self-contained, no shared references.
    resources:
    - name: extractedText-naId
      path: /extractedText/{naId}
      operations:
      - name: get
        method: GET
        description: Get extracted text for a given naid and digital object ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: national-archives-and-records-administration-extracted-text-rest
    port: 8080
    description: REST adapter for NextGen Catalog API — Extracted Text. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/extractedtext/{naid}
      name: extractedtext-naid
      description: REST surface for extractedText-naId.
      operations:
      - method: GET
        name: get
        description: Get extracted text for a given naid and digital object ID.
        call: national-archives-and-records-administration-extracted-text.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: national-archives-and-records-administration-extracted-text-mcp
    port: 9090
    transport: http
    description: MCP adapter for NextGen Catalog API — Extracted Text. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-extracted-text-given-naid
      description: Get extracted text for a given naid and digital object ID.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-archives-and-records-administration-extracted-text.get
      outputParameters:
      - type: object
        mapping: $.
